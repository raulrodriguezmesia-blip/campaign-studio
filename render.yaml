services:
  - type: web
    name: campaign-studio-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn wsgi:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://campaign-studio-new.vercel.app,http://localhost:8080,http://localhost:3000"
